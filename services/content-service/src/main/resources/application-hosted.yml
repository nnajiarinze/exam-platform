spring:
  config:
    activate:
      on-profile: hosted | production
  datasource:
    url: ${CONTENT_DATABASE_URL}
    username: ${CONTENT_DATABASE_USERNAME}
    password: ${CONTENT_DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${CONTENT_DB_MAX_POOL_SIZE:5}
      minimum-idle: ${CONTENT_DB_MIN_IDLE:1}
      connection-timeout: ${CONTENT_DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${CONTENT_DB_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${CONTENT_DB_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${CONTENT_DB_MAX_LIFETIME_MS:1200000}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://${OIDC_INTERNAL_HOSTPORT}/auth/realms/exam-platform/protocol/openid-connect/certs
server:
  shutdown: graceful
  forward-headers-strategy: native
content:
  identity:
    development-header-enabled: false
    development-allowed-origins: ${CORS_ALLOWED_ORIGINS}
  learning-service:
    base-url: ${LEARNING_SERVICE_BASE_URL:http://${LEARNING_SERVICE_HOSTPORT}}
    internal-api-key: ${LEARNING_INTERNAL_API_KEY}
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://${AI_SERVICE_HOSTPORT}}
    internal-api-key: ${AI_INTERNAL_API_KEY}
