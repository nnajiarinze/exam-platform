spring:
  application:
    name: content-service
  datasource:
    url: ${CONTENT_DATABASE_URL:jdbc:postgresql://localhost:5434/content}
    username: ${CONTENT_DATABASE_USERNAME:content}
    password: ${CONTENT_DATABASE_PASSWORD:content}
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:20s}
  jackson:
    default-property-inclusion: non_null
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8090/realms/exam-platform}
          jwk-set-uri: ${OIDC_JWK_SET_URI:http://localhost:8090/realms/exam-platform/protocol/openid-connect/certs}

server:
  port: ${PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info

content:
  rate-limit:
    sensitive-writes-per-window: ${CONTENT_SENSITIVE_WRITE_LIMIT:30}
    window-seconds: ${CONTENT_RATE_LIMIT_WINDOW_SECONDS:60}
  identity:
    development-header-enabled: ${CONTENT_DEV_IDENTITY_ENABLED:false}
    development-allowed-origins: ${CORS_ALLOWED_ORIGINS:${CONTENT_DEV_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}}
  security:
    audience: ${CONTENT_OIDC_AUDIENCE:content-api}
  learning-service:
    base-url: ${LEARNING_SERVICE_BASE_URL:http://${LEARNING_SERVICE_HOSTPORT:localhost:8080}}
    internal-api-key: ${LEARNING_INTERNAL_API_KEY:}
  ai-service:
    base-url: ${AI_SERVICE_BASE_URL:http://${AI_SERVICE_HOSTPORT:localhost:8083}}
    internal-api-key: ${AI_INTERNAL_API_KEY:}
