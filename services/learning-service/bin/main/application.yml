spring:
  application:
    name: learning-service
  datasource:
    url: ${LEARNING_DATABASE_URL:jdbc:postgresql://localhost:5433/learning}
    username: ${LEARNING_DATABASE_USERNAME:learning}
    password: ${LEARNING_DATABASE_PASSWORD:learning}
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: ${SHUTDOWN_TIMEOUT:20s}
  jackson:
    default-property-inclusion: non_null
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI:http://localhost:8090/realms/exam-platform}
          jwk-set-uri: ${OIDC_JWK_SET_URI:http://localhost:8090/realms/exam-platform/protocol/openid-connect/certs}

server:
  port: ${PORT:8080}

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: health,info

learning:
  rate-limit:
    mock-exam-starts-per-window: ${LEARNING_MOCK_EXAM_START_LIMIT:10}
    window-seconds: ${LEARNING_RATE_LIMIT_WINDOW_SECONDS:60}
  identity:
    development-header-enabled: ${LEARNING_DEV_IDENTITY_ENABLED:false}
    allowed-origins: ${CORS_ALLOWED_ORIGINS:${LEARNING_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}}
  security:
    audience: ${LEARNING_OIDC_AUDIENCE:learning-api}
  practice:
    max-question-count: ${LEARNING_MAX_PRACTICE_QUESTIONS:50}
  mock-exam:
    expiry-scan-ms: ${LEARNING_MOCK_EXPIRY_SCAN_MS:30000}

email:
  provider: ${EMAIL_PROVIDER:logging}
  resend:
    api-key: ${RESEND_API_KEY:}
    from-email: ${RESEND_FROM_EMAIL:}
    from-name: ${RESEND_FROM_NAME:Svea Study}
    reply-to-email: ${RESEND_REPLY_TO_EMAIL:}
    api-base-url: ${RESEND_API_BASE_URL:https://api.resend.com}
    timeout: ${RESEND_TIMEOUT:10s}
    max-retries: ${RESEND_MAX_RETRIES:2}
