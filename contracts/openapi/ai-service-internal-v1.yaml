openapi: 3.1.0
info:
  title: AI Service Internal Editorial API
  version: 1.0.0
  description: Service-to-service contract. This API is never called from a browser.
servers: [{url: /}]
security: [{internalApiKey: []}]
paths:
  /internal/v1/provider/status:
    get: {operationId: getInternalAiProviderStatus,responses: {'200': {description: Provider circuit and application-tracked usage,content: {application/json: {schema: {$ref: '#/components/schemas/ProviderStatus'}}}}}}
  /internal/v1/provider/alerts:
    get: {operationId: listInternalAiProviderAlerts,responses: {'200': {description: Provider alerts,content: {application/json: {schema: {type: array,items: {$ref: '#/components/schemas/ProviderAlert'}}}}}}}
  /internal/v1/provider/disable:
    post: {operationId: disableInternalAiProvider,requestBody: {$ref: '#/components/requestBodies/Actor'},responses: {'200': {description: Disabled provider status,content: {application/json: {schema: {$ref: '#/components/schemas/ProviderStatus'}}}}}}
  /internal/v1/provider/recheck:
    post: {operationId: recheckInternalAiProvider,requestBody: {$ref: '#/components/requestBodies/Actor'},responses: {'200': {description: Rechecked provider status,content: {application/json: {schema: {$ref: '#/components/schemas/ProviderStatus'}}}}}}
  /internal/v1/provider/alerts/{alertId}/acknowledge:
    post: {operationId: acknowledgeInternalAiProviderAlert,parameters: [{name: alertId,in: path,required: true,schema: {type: string,format: uuid}}],requestBody: {$ref: '#/components/requestBodies/Actor'},responses: {'204': {description: Acknowledged}}}
  /internal/v1/editorial/jobs:
    post:
      operationId: createInternalEditorialJob
      requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/InternalEditorialJobRequest'}}}}
      responses: {'202': {description: Queued,content: {application/json: {schema: {$ref: '#/components/schemas/InternalEditorialJob'}}}},'401': {$ref: '#/components/responses/AuthenticationRequired'},'422': {$ref: '#/components/responses/Error'},'429': {$ref: '#/components/responses/Error'}}
  /internal/v1/editorial/jobs/{jobId}:
    get: {operationId: getInternalEditorialJob,parameters: [{$ref: '#/components/parameters/JobId'}],responses: {'200': {description: Job,content: {application/json: {schema: {$ref: '#/components/schemas/InternalEditorialJob'}}}},'404': {$ref: '#/components/responses/Error'}}}
  /internal/v1/editorial/jobs/{jobId}/cancel:
    post: {operationId: cancelInternalEditorialJob,parameters: [{$ref: '#/components/parameters/JobId'}],responses: {'200': {description: Cancellation state,content: {application/json: {schema: {$ref: '#/components/schemas/InternalEditorialJob'}}}},'409': {$ref: '#/components/responses/Error'}}}
  /internal/v1/editorial/jobs/{jobId}/proposals:
    get: {operationId: listInternalEditorialProposals,parameters: [{$ref: '#/components/parameters/JobId'}],responses: {'200': {description: Proposals,content: {application/json: {schema: {type: array,items: {$ref: '#/components/schemas/InternalEditorialProposal'}}}}}}}
  /internal/v1/editorial/jobs/{jobId}/findings:
    get: {operationId: listInternalEditorialFindings,parameters: [{$ref: '#/components/parameters/JobId'}],responses: {'200': {description: Findings,content: {application/json: {schema: {type: array,items: {$ref: '#/components/schemas/InternalEditorialFinding'}}}}}}}
  /internal/v1/editorial/proposals/{proposalId}:
    get:
      operationId: getInternalEditorialProposal
      parameters: [{$ref: '#/components/parameters/ProposalId'}]
      responses: {'200': {description: Proposal,content: {application/json: {schema: {type: object,additionalProperties: true}}}}}
    patch: {operationId: editInternalEditorialProposal,parameters: [{$ref: '#/components/parameters/ProposalId'}],requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/EditRequest'}}}},responses: {'200': {description: Proposal,content: {application/json: {schema: {$ref: '#/components/schemas/InternalEditorialProposal'}}}},'409': {$ref: '#/components/responses/Error'}}}
  /internal/v1/editorial/proposals/{proposalId}/reject:
    post:
      operationId: rejectInternalEditorialProposal
      parameters: [{$ref: '#/components/parameters/ProposalId'}]
      requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/DecisionRequest'}}}}
      responses: {'200': {description: Proposal,content: {application/json: {schema: {$ref: '#/components/schemas/InternalEditorialProposal'}}}}}
  /internal/v1/editorial/proposals/{proposalId}/accepted:
    post: {operationId: markInternalEditorialProposalAccepted,parameters: [{$ref: '#/components/parameters/ProposalId'}],requestBody: {required: true,content: {application/json: {schema: {type: object,required: [factId,factVersionId,actor,version],properties: {factId: {type: string,format: uuid},factVersionId: {type: string,format: uuid},actor: {type: string},version: {type: integer,format: int64}}}}}},responses: {'204': {description: Accepted marker recorded}}}
  /internal/v1/editorial/findings/{findingId}:
    get:
      operationId: getInternalEditorialFinding
      parameters: [{$ref: '#/components/parameters/FindingId'}]
      responses: {'200': {description: Finding,content: {application/json: {schema: {$ref: '#/components/schemas/InternalEditorialFinding'}}}}}
  /internal/v1/editorial/findings/{findingId}/dismiss:
    post: {operationId: dismissInternalEditorialFinding,parameters: [{$ref: '#/components/parameters/FindingId'}],requestBody: {required: true,content: {application/json: {schema: {type: object,required: [actor,version],properties: {actor: {type: string},reason: {type: [string,'null'],maxLength: 500},version: {type: integer,format: int64}}}}}},responses: {'200': {description: Dismissed finding,content: {application/json: {schema: {$ref: '#/components/schemas/InternalEditorialFinding'}}}},'409': {$ref: '#/components/responses/Error'}}}
  /internal/v1/question-generation/jobs:
    post: {operationId: createInternalQuestionGenerationJob,requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/InternalQuestionGenerationRequest'}}}},responses: {'202': {description: Queued question-generation job,content: {application/json: {schema: {$ref: '#/components/schemas/InternalQuestionGenerationJob'}}}},'401': {$ref: '#/components/responses/AuthenticationRequired'},'422': {$ref: '#/components/responses/Error'},'429': {$ref: '#/components/responses/Error'}}}
  /internal/v1/question-generation/jobs/{jobId}:
    get: {operationId: getInternalQuestionGenerationJob,parameters: [{$ref: '#/components/parameters/JobId'}],responses: {'200': {description: Job,content: {application/json: {schema: {$ref: '#/components/schemas/InternalQuestionGenerationJob'}}}},'404': {$ref: '#/components/responses/Error'}}}
  /internal/v1/question-generation/jobs/{jobId}/proposals:
    get: {operationId: listInternalQuestionProposals,parameters: [{$ref: '#/components/parameters/JobId'}],responses: {'200': {description: Persistent question proposals,content: {application/json: {schema: {type: array,items: {$ref: '#/components/schemas/InternalQuestionProposal'}}}}}}}
  /internal/v1/question-generation/jobs/{jobId}/cancel:
    post: {operationId: cancelInternalQuestionGenerationJob,parameters: [{$ref: '#/components/parameters/JobId'}],responses: {'200': {description: Cancellation state,content: {application/json: {schema: {$ref: '#/components/schemas/InternalQuestionGenerationJob'}}}},'409': {$ref: '#/components/responses/Error'}}}
  /internal/v1/question-generation/proposals/{proposalId}:
    get: {operationId: getInternalQuestionProposal,parameters: [{$ref: '#/components/parameters/ProposalId'}],responses: {'200': {description: Question proposal,content: {application/json: {schema: {$ref: '#/components/schemas/InternalQuestionProposal'}}}}}
  /internal/v1/question-generation/proposals/{proposalId}/reject:
    post: {operationId: rejectInternalQuestionProposal,parameters: [{$ref: '#/components/parameters/ProposalId'}],requestBody: {required: true,content: {application/json: {schema: {type: object,required: [actor,version],properties: {actor: {type: string},reason: {type: [string,'null'],maxLength: 500},version: {type: integer,format: int64,minimum: 0}}}}}},responses: {'200': {description: Rejected proposal,content: {application/json: {schema: {$ref: '#/components/schemas/InternalQuestionProposal'}}}},'409': {$ref: '#/components/responses/Error'}}}
  /internal/v1/question-generation/proposals/{proposalId}/revalidate:
    post: {operationId: revalidateInternalQuestionProposal,parameters: [{$ref: '#/components/parameters/ProposalId'}],responses: {'200': {description: Fresh grounding and intelligence validation,content: {application/json: {schema: {type: object,required: [valid,proposalChecksum,validationChecksum,intelligenceEngineVersion,evaluatedAt,sourceChecksums],properties: {valid: {type: boolean,const: true},proposalChecksum: {type: string,pattern: '^[a-f0-9]{64}$'},validationChecksum: {type: string,pattern: '^[a-f0-9]{64}$'},intelligenceEngineVersion: {type: string},evaluatedAt: {type: string,format: date-time},sourceChecksums: {type: array,items: {type: object,required: [sourceId,checksum],properties: {sourceId: {type: string,format: uuid},checksum: {type: string}}}}}}}}},'409': {$ref: '#/components/responses/Error'}}}
  /internal/v1/question-generation/proposals/{proposalId}/accept:
    post: {operationId: acceptInternalQuestionProposal,parameters: [{$ref: '#/components/parameters/ProposalId'}],requestBody: {required: true,content: {application/json: {schema: {type: object,required: [questionId,actor,version,validationChecksum],properties: {questionId: {type: string,format: uuid},actor: {type: string},version: {type: integer,format: int64,minimum: 0},validationChecksum: {type: string,pattern: '^[a-f0-9]{64}$'}}}}}},responses: {'200': {description: Accepted proposal linkage,content: {application/json: {schema: {$ref: '#/components/schemas/InternalQuestionProposal'}}}},'409': {$ref: '#/components/responses/Error'}}}
components:
  requestBodies:
    Actor: {required: true,content: {application/json: {schema: {type: object,required: [actor],properties: {actor: {type: string}}}}}}
  securitySchemes:
    internalApiKey: {type: apiKey,in: header,name: X-Internal-Api-Key}
  parameters:
    JobId: {name: jobId,in: path,required: true,schema: {type: string,format: uuid}}
    ProposalId: {name: proposalId,in: path,required: true,schema: {type: string,format: uuid}}
    FindingId: {name: findingId,in: path,required: true,schema: {type: string,format: uuid}}
  responses:
    AuthenticationRequired: {description: Valid service authentication is required,content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
    Error: {description: Controlled error,content: {application/json: {schema: {$ref: '#/components/schemas/Error'}}}}
  schemas:
    UsageMode: {type: string,enum: [FREE_ONLY,PAID_ALLOWED,DISABLED]}
    ProviderCircuitState: {type: string,enum: [CLOSED,WARNING,CRITICAL,RATE_LIMITED,QUOTA_PAUSED,BILLING_SAFETY_PAUSED,MANUALLY_DISABLED,CONFIGURATION_INVALID]}
    ProviderStatus: {type: object,required: [provider,model,usageMode,featureEnabled,usageLabel,authoritativeQuota,configurationValid,state,usage,limits],properties: {provider: {type: string},model: {type: string},usageMode: {$ref: '#/components/schemas/UsageMode'},featureEnabled: {type: boolean},projectLabel: {type: string},expectedBillingTier: {type: string},usageLabel: {type: string,const: Application-tracked usage},authoritativeQuota: {type: boolean,const: false},configurationValid: {type: boolean},configurationError: {type: string},state: {$ref: '#/components/schemas/ProviderCircuitState'},reason: {type: [string,'null']},pausedUntil: {type: [string,'null'],format: date-time},manuallyDisabled: {type: boolean},usage: {type: object,additionalProperties: true},limits: {type: object,additionalProperties: true}}}
    ProviderAlert: {type: object,required: [id,severity,code,message,createdAt],properties: {id: {type: string,format: uuid},severity: {type: string,enum: [WARNING,CRITICAL]},code: {type: string},message: {type: string},createdAt: {type: string,format: date-time},acknowledgedAt: {type: [string,'null'],format: date-time},acknowledgedBy: {type: [string,'null']}}}
    Operation: {type: string,enum: [REWRITE_FOR_CLARITY,SIMPLIFY_LANGUAGE,MAKE_ATOMIC,SPLIT_FACT,CHECK_SOURCE_SUPPORT,DETECT_AMBIGUITY,EDITORIAL_REVIEW_NOTES]}
    Evidence: {type: object,required: [sourceId,quote],properties: {sourceId: {type: string,format: uuid},sourceTitle: {type: [string,'null']},quote: {type: string},location: {type: [string,'null']}}}
    Target: {type: object,required: [factId,factVersionId,version,text,checksum],properties: {factId: {type: string,format: uuid},factVersionId: {type: string,format: uuid},version: {type: integer,format: int64},text: {type: string,maxLength: 500,description: Must contain a deterministically valid or suspicious declarative factual claim; invalid text returns AI_EDITORIAL_INPUT_INVALID before job creation},checksum: {type: string,pattern: '^[a-f0-9]{64}$'}}}
    Source: {type: object,required: [sourceId,title,text,checksum],properties: {sourceId: {type: string,format: uuid},title: {type: string},text: {type: string},checksum: {type: string,pattern: '^[a-f0-9]{64}$'}}}
    InternalEditorialJobRequest: {type: object,required: [operation,targets,sources,learningObjectiveId,objectiveTitle,language,count,requestedBy,idempotencyKey],properties: {operation: {$ref: '#/components/schemas/Operation'},targets: {type: array,minItems: 1,maxItems: 1,items: {$ref: '#/components/schemas/Target'}},sources: {type: array,items: {$ref: '#/components/schemas/Source'}},learningObjectiveId: {type: string,format: uuid},objectiveTitle: {type: string},language: {type: string},readingPreference: {type: [string,'null']},instruction: {type: [string,'null'],maxLength: 1000},count: {type: integer,minimum: 1,maximum: 5},requestedBy: {type: string},idempotencyKey: {type: string,maxLength: 200}}}
    InternalEditorialJob: {type: object,required: [id,operationType,requestedBy,status,resultCount,findingCount,version],properties: {id: {type: string,format: uuid},operationType: {$ref: '#/components/schemas/Operation'},resultType: {type: [string,'null'],enum: [PROPOSALS_AVAILABLE,ALREADY_CLEAR,NO_MEANINGFUL_CHANGE,INSUFFICIENT_GROUNDED_EVIDENCE,FINDINGS_AVAILABLE,null]},requestedBy: {type: string},status: {type: string,enum: [QUEUED,RUNNING,COMPLETED,PARTIALLY_COMPLETED,FAILED,CANCELLED]},resultCount: {type: integer},findingCount: {type: integer},version: {type: integer,format: int64}},additionalProperties: true}
    InternalEditorialProposal: {type: object,required: [id,generationJobId,operationType,targetFactId,proposedText,editedText,sourceEvidence,status,version],properties: {id: {type: string,format: uuid},generationJobId: {type: string,format: uuid},operationType: {$ref: '#/components/schemas/Operation'},targetFactId: {type: string,format: uuid},proposedText: {type: string},editedText: {type: string},sourceEvidence: {type: array,items: {$ref: '#/components/schemas/Evidence'}},coverage: {type: object,additionalProperties: true},warnings: {type: array,items: {type: string}},proposalOrder: {type: [integer,'null']},status: {type: string},version: {type: integer,format: int64}}}
    InternalEditorialFinding: {type: object,required: [id,generationJobId,operationType,targetFactId,findingType,severity,title,message,sourceEvidence,metadata,status,version],properties: {id: {type: string,format: uuid},generationJobId: {type: string,format: uuid},operationType: {$ref: '#/components/schemas/Operation'},targetFactId: {type: string,format: uuid},findingType: {type: string},severity: {type: string,enum: [INFO,WARNING,HIGH,BLOCKING]},title: {type: string},message: {type: string},affectedText: {type: [string,'null']},sourceEvidence: {type: array,items: {$ref: '#/components/schemas/Evidence'}},metadata: {type: object,additionalProperties: true},status: {type: string,enum: [OPEN,DISMISSED]},version: {type: integer,format: int64}}}
    EditRequest: {type: object,required: [text,version],properties: {text: {type: string,minLength: 1,maxLength: 500},version: {type: integer,format: int64}}}
    DecisionRequest: {type: object,required: [version],properties: {reason: {type: [string,'null'],maxLength: 500},version: {type: integer,format: int64}}}
    QuestionType: {type: string,enum: [SINGLE_CHOICE,TRUE_FALSE,MULTIPLE_CHOICE]}
    QuestionTarget: {type: object,additionalProperties: false,required: [knowledgeFactId,knowledgeFactVersionId,version,text,checksum,language],properties: {knowledgeFactId: {type: string,format: uuid},knowledgeFactVersionId: {type: string,format: uuid},version: {type: integer,format: int64},text: {type: string,minLength: 1,maxLength: 5000},checksum: {type: string,pattern: '^[a-f0-9]{64}$'},language: {type: string}}}
    QuestionSource: {type: object,additionalProperties: false,required: [sourceId,title,checksum,contentExcerpt],properties: {sourceId: {type: string,format: uuid},title: {type: string},checksum: {type: string,pattern: '^[a-f0-9]{64}$'},contentExcerpt: {type: string,maxLength: 12000}}}
    QuestionContext: {type: object,additionalProperties: false,required: [learningObjectiveId,learningObjectiveTitle,topicId,topicTitle,subjectId,subjectTitle,examId,examVersionId,sources],properties: {learningObjectiveId: {type: string,format: uuid},learningObjectiveTitle: {type: string},learningObjectiveDescription: {type: [string,'null']},topicId: {type: string,format: uuid},topicTitle: {type: string},subjectId: {type: string,format: uuid},subjectTitle: {type: string},examId: {type: string,format: uuid},examVersionId: {type: string,format: uuid},sources: {type: array,items: {$ref: '#/components/schemas/QuestionSource'}}}}
    InternalQuestionGenerationRequest: {type: object,additionalProperties: false,required: [target,context,proposalCount,requestedBy,idempotencyKey],properties: {target: {$ref: '#/components/schemas/QuestionTarget'},context: {$ref: '#/components/schemas/QuestionContext'},proposalCount: {type: integer,minimum: 1,maximum: 3},questionType: {anyOf: [{$ref: '#/components/schemas/QuestionType'},{type: 'null'}]},requestedBy: {type: string},idempotencyKey: {type: string,minLength: 1,maxLength: 200}}}
    InternalQuestionGenerationJob: {type: object,required: [id,operationType,requestedBy,requestedCount,targetKnowledgeFactId,targetKnowledgeFactVersionId,targetVersion,targetChecksum,status,provider,model,promptVersion,createdAt,retryCount,proposalCount,version],additionalProperties: true,properties: {id: {type: string,format: uuid},operationType: {type: string,const: GENERATE_QUESTIONS_FROM_FACT},resultType: {type: [string,'null'],enum: [QUESTIONS_PROPOSED,INSUFFICIENT_GROUNDED_INFORMATION,FACT_NOT_SUITABLE_FOR_QUESTION,null]},requestedBy: {type: string},requestedCount: {type: integer},targetKnowledgeFactId: {type: string,format: uuid},targetKnowledgeFactVersionId: {type: string,format: uuid},targetVersion: {type: integer,format: int64},targetChecksum: {type: string},status: {type: string,enum: [QUEUED,RUNNING,COMPLETED,PARTIALLY_COMPLETED,FAILED,CANCELLED]},provider: {type: string},model: {type: string},promptVersion: {type: string},createdAt: {type: string,format: date-time},retryCount: {type: integer},proposalCount: {type: integer},version: {type: integer,format: int64}}}
    InternalQuestionProposal: {type: object,required: [id,generationJobId,questionType,questionText,language,answerOptions,explanation,rationale,evidence,status,provider,model,promptVersion,intelligenceAssessment,version],additionalProperties: true,properties: {id: {type: string,format: uuid},generationJobId: {type: string,format: uuid},questionType: {$ref: '#/components/schemas/QuestionType'},questionText: {type: string},language: {type: string},answerOptions: {type: array,items: {type: object,required: [id,optionKey,displayOrder,text,correct],properties: {id: {type: string,format: uuid},optionKey: {type: string},displayOrder: {type: integer},text: {type: string},correct: {type: boolean}}}},explanation: {type: string},rationale: {type: string},evidence: {type: array,items: {type: object,additionalProperties: true}},status: {type: string,enum: [PROPOSED,REJECTED,ACCEPTED]},acceptedQuestionId: {type: [string,'null'],format: uuid},acceptedBy: {type: [string,'null']},acceptedAt: {type: [string,'null'],format: date-time},provider: {type: string},model: {type: string},promptVersion: {type: string},intelligenceAssessment: {type: object,required: [evaluationStatus],additionalProperties: true,properties: {evaluationStatus: {type: string,enum: [NOT_EVALUATED,EVALUATED]}}},version: {type: integer,format: int64}}}
    Error: {type: object,required: [code,message,timestamp,errors],properties: {code: {type: string},message: {type: string},timestamp: {type: string,format: date-time},errors: {type: array,items: {type: object}}}}
