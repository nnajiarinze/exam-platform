  /api/v1/admin/questions/{questionId}/approve:
    parameters: [{$ref: '#/components/parameters/QuestionId'}]
    post: {operationId: approveQuestion, summary: Approve question, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], requestBody: {$ref: '#/components/requestBodies/FactAction'}, responses: {'200': {description: Approved,content: {application/json: {schema: {$ref: '#/components/schemas/Question'}}}},'403': {$ref: '#/components/responses/Forbidden'}}}
  /api/v1/admin/questions/{questionId}/reject:
    parameters: [{$ref: '#/components/parameters/QuestionId'}]
    post: {operationId: rejectQuestion, summary: Reject question, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], requestBody: {$ref: '#/components/requestBodies/FactAction'}, responses: {'200': {description: Rejected,content: {application/json: {schema: {$ref: '#/components/schemas/Question'}}}}}}
  /api/v1/admin/questions/{questionId}/require-update:
    parameters: [{$ref: '#/components/parameters/QuestionId'}]
