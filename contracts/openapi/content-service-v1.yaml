  /api/v1/admin/questions/{questionId}:
    parameters: [{$ref: '#/components/parameters/QuestionId'}]
    get: {operationId: getQuestion, summary: Get question details, security: [{adminBearer: []}], responses: {'200': {description: Question,content: {application/json: {schema: {$ref: '#/components/schemas/Question'}}}},'404': {$ref: '#/components/responses/NotFound'}}}
    put: {operationId: updateQuestion, summary: Update a draft or create a new draft version from an approved question, security: [{adminBearer: []}], requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/QuestionRequest'}}}}, responses: {'200': {description: Updated,content: {application/json: {schema: {$ref: '#/components/schemas/Question'}}}},'409': {$ref: '#/components/responses/Conflict'},'422': {$ref: '#/components/responses/Validation'}}}
    delete: {operationId: deleteQuestion, summary: Delete an owned unused unreviewed draft question, parameters: [{$ref: '#/components/parameters/DeleteReason'}], security: [{adminBearer: []}], responses: {'204': {description: Deleted},'403': {$ref: '#/components/responses/Forbidden'},'404': {$ref: '#/components/responses/NotFound'},'409': {$ref: '#/components/responses/Conflict'}}}
