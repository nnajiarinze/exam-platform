  /api/v1/admin/knowledge-facts/{knowledgeFactId}/require-update:
    parameters: [{$ref: '#/components/parameters/KnowledgeFactId'}]
    post: {operationId: requireKnowledgeFactUpdate, summary: Require fact update, security: [{adminBearer: []}], requestBody: {$ref: '#/components/requestBodies/FactAction'}, responses: {'200': {description: Update required,content: {application/json: {schema: {$ref: '#/components/schemas/KnowledgeFact'}}}},'409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/knowledge-facts/{knowledgeFactId}/retire:
    parameters: [{$ref: '#/components/parameters/KnowledgeFactId'}]
