openapi: 3.1.0
info:
  title: Content Service Admin API
  version: 1.0.0
  description: Minimal Phase 1.5 admin integration contract. Development header authentication is non-production.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /
    description: Deployment-relative; clients configure the environment-specific origin
paths:
  /api/v1/status:
    get:
      operationId: getContentServiceStatus
      summary: Check authenticated Content Service readiness
      description: Requires at least one recognized admin role. The development headers are replaced by bearer authentication in production.
      security:
        - developmentAdminIdentity: []
          developmentAdminRoles: []
      responses:
        '200':
          description: Service and owned database are ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContentServiceStatus'
        '401':
          $ref: '#/components/responses/AuthenticationRequired'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/UnexpectedError'
  /api/v1/admin/exams:
    get: { operationId: listExams, summary: listExams, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], parameters: [{name: page, in: query, schema: {type: integer, default: 0}}, {name: size, in: query, schema: {type: integer, default: 20}}, {name: search, in: query, schema: {type: string}}, {name: status, in: query, schema: {$ref: '#/components/schemas/StructureStatus'}}, {name: countryCode, in: query, schema: {type: string}}, {name: sort, in: query, schema: {type: string}}], responses: {'200': {description: Exam page, content: {application/json: {schema: {$ref: '#/components/schemas/ExamPage'}}}}, '401': {$ref: '#/components/responses/AuthenticationRequired'}, '403': {$ref: '#/components/responses/Forbidden'}} }
    post: { operationId: createExam, summary: createExam, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ExamRequest'}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Exam'}}}}, '401': {$ref: '#/components/responses/AuthenticationRequired'}, '403': {$ref: '#/components/responses/Forbidden'}, '409': {$ref: '#/components/responses/Conflict'}, '422': {$ref: '#/components/responses/Validation'}} }
  /api/v1/admin/exams/{examId}:
    parameters: [{$ref: '#/components/parameters/ExamId'}]
    get: {operationId: getExam, summary: getExam, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], responses: {'200': {description: Exam, content: {application/json: {schema: {$ref: '#/components/schemas/Exam'}}}}, '404': {$ref: '#/components/responses/NotFound'}}}
    put: {operationId: updateExam, summary: updateExam, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ExamRequest'}}}}, responses: {'200': {description: Updated, content: {application/json: {schema: {$ref: '#/components/schemas/Exam'}}}}, '409': {$ref: '#/components/responses/Conflict'}, '422': {$ref: '#/components/responses/Validation'}}}
  /api/v1/admin/exams/{examId}/archive:
    parameters: [{$ref: '#/components/parameters/ExamId'}]
    post: {operationId: archiveExam, summary: archiveExam, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {$ref: '#/components/requestBodies/VersionOnly'}, responses: {'200': {description: Archived, content: {application/json: {schema: {$ref: '#/components/schemas/Exam'}}}}, '409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/exams/{examId}/versions:
    parameters: [{$ref: '#/components/parameters/ExamId'}]
    get: {operationId: listExamVersions, summary: listExamVersions, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], parameters: [{name: status, in: query, schema: {$ref: '#/components/schemas/StructureStatus'}}, {name: validAt, in: query, schema: {type: string, format: date}}, {name: search, in: query, schema: {type: string}}], responses: {'200': {description: Versions, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/ExamVersion'}}}}}}}
    post: {operationId: createExamVersion, summary: createExamVersion, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ExamVersionRequest'}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/ExamVersion'}}}}, '409': {$ref: '#/components/responses/Conflict'}, '422': {$ref: '#/components/responses/Validation'}}}
  /api/v1/admin/exam-versions/{examVersionId}:
    parameters: [{$ref: '#/components/parameters/ExamVersionId'}]
    get: {operationId: getExamVersion, summary: getExamVersion, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], responses: {'200': {description: Version, content: {application/json: {schema: {$ref: '#/components/schemas/ExamVersion'}}}}, '404': {$ref: '#/components/responses/NotFound'}}}
    put: {operationId: updateExamVersion, summary: updateExamVersion, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ExamVersionRequest'}}}}, responses: {'200': {description: Updated, content: {application/json: {schema: {$ref: '#/components/schemas/ExamVersion'}}}}, '409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/exam-versions/{examVersionId}/archive:
    parameters: [{$ref: '#/components/parameters/ExamVersionId'}]
    post: {operationId: archiveExamVersion, summary: archiveExamVersion, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {$ref: '#/components/requestBodies/VersionOnly'}, responses: {'200': {description: Archived, content: {application/json: {schema: {$ref: '#/components/schemas/ExamVersion'}}}}}}
  /api/v1/admin/exam-versions/{examVersionId}/subjects:
    parameters: [{$ref: '#/components/parameters/ExamVersionId'}]
    get: {operationId: listSubjects, summary: listSubjects, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], responses: {'200': {description: Subjects, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Subject'}}}}}}}
    post: {operationId: createSubject, summary: createSubject, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/NodeRequest'}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Subject'}}}}}}
  /api/v1/admin/exam-versions/{examVersionId}/subjects/order:
    parameters: [{$ref: '#/components/parameters/ExamVersionId'}]
    put: {operationId: reorderSubjects, summary: reorderSubjects, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {$ref: '#/components/requestBodies/Order'}, responses: {'204': {description: Reordered}, '409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/subjects/{subjectId}:
    parameters: [{$ref: '#/components/parameters/SubjectId'}]
    get: {operationId: getSubject, summary: getSubject, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], responses: {'200': {description: Subject, content: {application/json: {schema: {$ref: '#/components/schemas/Subject'}}}}}}
    put: {operationId: updateSubject, summary: updateSubject, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/NodeRequest'}}}}, responses: {'200': {description: Updated, content: {application/json: {schema: {$ref: '#/components/schemas/Subject'}}}}, '409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/subjects/{subjectId}/archive:
    parameters: [{$ref: '#/components/parameters/SubjectId'}]
    post: {operationId: archiveSubject, summary: archiveSubject, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {$ref: '#/components/requestBodies/VersionOnly'}, responses: {'200': {description: Archived, content: {application/json: {schema: {$ref: '#/components/schemas/Subject'}}}}}}
  /api/v1/admin/subjects/{subjectId}/topics:
    parameters: [{$ref: '#/components/parameters/SubjectId'}]
    get: {operationId: listTopics, summary: listTopics, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], responses: {'200': {description: Topics, content: {application/json: {schema: {type: array, items: {$ref: '#/components/schemas/Topic'}}}}}}}
    post: {operationId: createTopic, summary: createTopic, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/NodeRequest'}}}}, responses: {'201': {description: Created, content: {application/json: {schema: {$ref: '#/components/schemas/Topic'}}}}}}
  /api/v1/admin/subjects/{subjectId}/topics/order:
    parameters: [{$ref: '#/components/parameters/SubjectId'}]
    put: {operationId: reorderTopics, summary: reorderTopics, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {$ref: '#/components/requestBodies/Order'}, responses: {'204': {description: Reordered}, '409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/topics/{topicId}:
    parameters: [{$ref: '#/components/parameters/TopicId'}]
    get: {operationId: getTopic, summary: getTopic, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], responses: {'200': {description: Topic, content: {application/json: {schema: {$ref: '#/components/schemas/Topic'}}}}}}
    put: {operationId: updateTopic, summary: updateTopic, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/NodeRequest'}}}}, responses: {'200': {description: Updated, content: {application/json: {schema: {$ref: '#/components/schemas/Topic'}}}}, '409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/topics/{topicId}/archive:
    parameters: [{$ref: '#/components/parameters/TopicId'}]
    post: {operationId: archiveTopic, summary: archiveTopic, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], requestBody: {$ref: '#/components/requestBodies/VersionOnly'}, responses: {'200': {description: Archived, content: {application/json: {schema: {$ref: '#/components/schemas/Topic'}}}}}}
  /api/v1/admin/sources:
    get: {operationId: listSources, summary: listSources, security: [{developmentAdminIdentity: [], developmentAdminRoles: []}], parameters: [{name: page,in: query,schema: {type: integer,default: 0}}, {name: size,in: query,schema: {type: integer,default: 20}}, {name: search,in: query,schema: {type: string}}, {name: publisher,in: query,schema: {type: string}}, {name: sourceType,in: query,schema: {$ref: '#/components/schemas/SourceType'}}, {name: reviewStatus,in: query,schema: {$ref: '#/components/schemas/ReviewStatus'}}, {name: status,in: query,schema: {$ref: '#/components/schemas/SourceStatus'}}, {name: accessedBefore,in: query,schema: {type: string,format: date}}, {name: accessedAfter,in: query,schema: {type: string,format: date}}, {name: sort,in: query,schema: {type: string}}], responses: {'200': {description: Source page,content: {application/json: {schema: {$ref: '#/components/schemas/SourcePage'}}}}}}
    post: {operationId: createSource, summary: createSource,security: [{developmentAdminIdentity: [],developmentAdminRoles: []}],requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/SourceRequest'}}}},responses: {'201': {description: Created,content: {application/json: {schema: {$ref: '#/components/schemas/Source'}}}},'409': {$ref: '#/components/responses/Conflict'},'422': {$ref: '#/components/responses/Validation'}}}
  /api/v1/admin/sources/{sourceId}:
    parameters: [{$ref: '#/components/parameters/SourceId'}]
    get: {operationId: getSource, summary: getSource,security: [{developmentAdminIdentity: [],developmentAdminRoles: []}],responses: {'200': {description: Source,content: {application/json: {schema: {$ref: '#/components/schemas/Source'}}}},'404': {$ref: '#/components/responses/NotFound'}}}
    put: {operationId: updateSource, summary: updateSource,security: [{developmentAdminIdentity: [],developmentAdminRoles: []}],requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/SourceRequest'}}}},responses: {'200': {description: Updated,content: {application/json: {schema: {$ref: '#/components/schemas/Source'}}}},'409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/sources/{sourceId}/review:
    parameters: [{$ref: '#/components/parameters/SourceId'}]
    post: {operationId: reviewSource, summary: reviewSource,security: [{developmentAdminIdentity: [],developmentAdminRoles: []}],requestBody: {$ref: '#/components/requestBodies/VersionOnly'},responses: {'200': {description: Reviewed,content: {application/json: {schema: {$ref: '#/components/schemas/Source'}}}}}}
  /api/v1/admin/sources/{sourceId}/require-update:
    parameters: [{$ref: '#/components/parameters/SourceId'}]
    post: {operationId: requireSourceUpdate, summary: requireSourceUpdate,security: [{developmentAdminIdentity: [],developmentAdminRoles: []}],requestBody: {$ref: '#/components/requestBodies/VersionOnly'},responses: {'200': {description: Marked,content: {application/json: {schema: {$ref: '#/components/schemas/Source'}}}}}}
  /api/v1/admin/sources/{sourceId}/retire:
    parameters: [{$ref: '#/components/parameters/SourceId'}]
    post: {operationId: retireSource, summary: retireSource,security: [{developmentAdminIdentity: [],developmentAdminRoles: []}],requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/RetireSourceRequest'}}}},responses: {'200': {description: Retired,content: {application/json: {schema: {$ref: '#/components/schemas/Source'}}}},'409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/learning-objectives:
    get: {operationId: listLearningObjectives, summary: List learning objectives, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], parameters: [{name: page,in: query,schema: {type: integer,default: 0}}, {name: size,in: query,schema: {type: integer,default: 20}}, {name: search,in: query,schema: {type: string}}, {name: topicId,in: query,schema: {type: string,format: uuid}}, {name: status,in: query,schema: {$ref: '#/components/schemas/StructureStatus'}}], responses: {'200': {description: Learning objective page,content: {application/json: {schema: {$ref: '#/components/schemas/LearningObjectivePage'}}}},'401': {$ref: '#/components/responses/AuthenticationRequired'},'403': {$ref: '#/components/responses/Forbidden'}}}
    post: {operationId: createLearningObjective, summary: Create learning objective, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/LearningObjectiveRequest'}}}}, responses: {'201': {description: Created,content: {application/json: {schema: {$ref: '#/components/schemas/LearningObjective'}}}},'409': {$ref: '#/components/responses/Conflict'},'422': {$ref: '#/components/responses/Validation'}}}
  /api/v1/admin/learning-objectives/{learningObjectiveId}:
    parameters: [{$ref: '#/components/parameters/LearningObjectiveId'}]
    get: {operationId: getLearningObjective, summary: Get learning objective, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], responses: {'200': {description: Learning objective,content: {application/json: {schema: {$ref: '#/components/schemas/LearningObjective'}}}},'404': {$ref: '#/components/responses/NotFound'}}}
    put: {operationId: updateLearningObjective, summary: Update learning objective, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/LearningObjectiveRequest'}}}}, responses: {'200': {description: Updated,content: {application/json: {schema: {$ref: '#/components/schemas/LearningObjective'}}}},'409': {$ref: '#/components/responses/Conflict'},'422': {$ref: '#/components/responses/Validation'}}}
  /api/v1/admin/learning-objectives/{learningObjectiveId}/archive:
    parameters: [{$ref: '#/components/parameters/LearningObjectiveId'}]
    post: {operationId: archiveLearningObjective, summary: Archive learning objective, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], requestBody: {$ref: '#/components/requestBodies/VersionOnly'}, responses: {'200': {description: Archived,content: {application/json: {schema: {$ref: '#/components/schemas/LearningObjective'}}}},'409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/knowledge-facts:
