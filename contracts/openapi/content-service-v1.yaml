  /api/v1/admin/knowledge-facts/{knowledgeFactId}/approve:
    parameters: [{$ref: '#/components/parameters/KnowledgeFactId'}]
    post: {operationId: approveKnowledgeFact, summary: Approve fact, security: [{adminBearer: []}], requestBody: {$ref: '#/components/requestBodies/FactAction'}, responses: {'200': {description: Approved,content: {application/json: {schema: {$ref: '#/components/schemas/KnowledgeFact'}}}},'403': {$ref: '#/components/responses/Forbidden'},'409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/knowledge-facts/{knowledgeFactId}/reject:
