  /api/v1/admin/releases/{releaseId}/eligible-facts:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    get: {operationId: listEligibleReleaseFacts,summary: List eligible approved facts,security: [{adminBearer: []}],parameters: [{$ref: '#/components/parameters/Search'},{name: subjectId,in: query,schema: {type: string,format: uuid}},{name: topicId,in: query,schema: {type: string,format: uuid}},{name: learningObjectiveId,in: query,schema: {type: string,format: uuid}}],responses: {'200': {description: Eligible facts,content: {application/json: {schema: {$ref: '#/components/schemas/EligibleContentResponse'}}}}}}
  /api/v1/admin/releases/{releaseId}/validate:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    post: {operationId: validateRelease,summary: Validate without publishing,security: [{adminBearer: []}],requestBody: {$ref: '#/components/requestBodies/VersionOnly'},responses: {'200': {description: Validation report,content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseValidationReport'}}}}}}
  /api/v1/admin/releases/{releaseId}/preview:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    get: {operationId: previewRelease,summary: Preview exact hierarchy and snapshot,security: [{adminBearer: []}],responses: {'200': {description: Preview,content: {application/json: {schema: {type: object,additionalProperties: true}}}}}}
  /api/v1/admin/releases/{releaseId}/snapshot:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    get: {operationId: getPublishedReleaseSnapshot,summary: Retrieve immutable published snapshot,security: [{adminBearer: []}],responses: {'200': {description: Snapshot,content: {application/json: {schema: {type: object,additionalProperties: true}}}}}}
  /api/v1/admin/releases/{releaseId}/diff:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    get: {operationId: getReleaseDiff,summary: Compare exact IDs and versions with previous release,security: [{adminBearer: []}],responses: {'200': {description: Diff,content: {application/json: {schema: {type: object,additionalProperties: true}}}}}}
  /api/v1/admin/releases/{releaseId}/delivery-attempts:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    get: {operationId: listReleaseDeliveryAttempts,summary: List delivery history,security: [{adminBearer: []}],responses: {'200': {description: Attempts,content: {application/json: {schema: {type: array,items: {$ref: '#/components/schemas/ReleaseDeliveryAttempt'}}}}}}}
  /api/v1/admin/releases/{releaseId}/publish:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    post: {operationId: publishRelease,summary: Irreversibly publish validated snapshot,security: [{adminBearer: []}],requestBody: {$ref: '#/components/requestBodies/VersionOnly'},responses: {'200': {description: Published,content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseDetail'}}}},'409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/releases/{releaseId}/deliver:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    post: {operationId: deliverRelease,summary: Import snapshot into Learning Service,security: [{adminBearer: []}],responses: {'200': {description: Delivered,content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseDetail'}}}},'503': {$ref: '#/components/responses/UnexpectedError'}}}
  /api/v1/admin/releases/{releaseId}/retry-delivery:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    post: {operationId: retryReleaseDelivery,summary: Retry immutable snapshot delivery,security: [{adminBearer: []}],responses: {'200': {description: Delivered,content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseDetail'}}}}}}
  /api/v1/admin/releases/{releaseId}/activate:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    post: {operationId: activateRelease,summary: Activate imported release for new learner sessions,security: [{adminBearer: []}],responses: {'200': {description: Active,content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseDetail'}}}},'409': {$ref: '#/components/responses/Conflict'}}}
  /api/v1/admin/releases/{releaseId}/retire:
    parameters: [{$ref: '#/components/parameters/ReleaseId'}]
    post: {operationId: retireRelease,summary: Retire non-active release,security: [{adminBearer: []}],requestBody: {$ref: '#/components/requestBodies/VersionOnly'},responses: {'200': {description: Retired,content: {application/json: {schema: {$ref: '#/components/schemas/ReleaseDetail'}}}}}}
  /api/v1/admin/audit-events:
    get:
      operationId: searchAuditEvents
      summary: Search immutable administrative audit events
      security: [{adminBearer: []}]
      parameters:
        - {name: actor, in: query, schema: {type: string}}
        - {name: entityType, in: query, schema: {type: string}}
        - {name: action, in: query, schema: {type: string}}
        - {name: requestId, in: query, schema: {type: string}}
        - {name: from, in: query, schema: {type: string, format: date-time}}
        - {name: to, in: query, schema: {type: string, format: date-time}}
        - {name: page, in: query, schema: {type: integer, minimum: 0, default: 0}}
        - {name: size, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 50}}
      responses:
        '200': {description: Paginated audit events, content: {application/json: {schema: {$ref: '#/components/schemas/AuditEventPage'}}}}
        '401': {$ref: '#/components/responses/AuthenticationRequired'}
        '403': {$ref: '#/components/responses/Forbidden'}
        '500': {$ref: '#/components/responses/UnexpectedError'}
  /api/v1/admin/reports/content-health:
    get: {operationId: getContentHealthReport, summary: Content coverage and lifecycle health, security: [{adminBearer: []}], responses: {'200': {description: Content health,content: {application/json: {schema: {$ref: '#/components/schemas/OperationalReport'}}}},'401': {$ref: '#/components/responses/AuthenticationRequired'},'403': {$ref: '#/components/responses/Forbidden'},'500': {$ref: '#/components/responses/UnexpectedError'}}}
  /api/v1/admin/reports/review-health:
    get: {operationId: getReviewHealthReport, summary: Review queue health, security: [{adminBearer: []}], responses: {'200': {description: Review health,content: {application/json: {schema: {$ref: '#/components/schemas/OperationalReport'}}}},'401': {$ref: '#/components/responses/AuthenticationRequired'},'403': {$ref: '#/components/responses/Forbidden'},'500': {$ref: '#/components/responses/UnexpectedError'}}}
  /api/v1/admin/reports/source-health:
    get: {operationId: getSourceHealthReport, summary: Source freshness and usage health, security: [{adminBearer: []}], responses: {'200': {description: Source health,content: {application/json: {schema: {$ref: '#/components/schemas/OperationalReport'}}}},'401': {$ref: '#/components/responses/AuthenticationRequired'},'403': {$ref: '#/components/responses/Forbidden'},'500': {$ref: '#/components/responses/UnexpectedError'}}}
  /api/v1/admin/reports/release-health:
    get: {operationId: getReleaseHealthReport, summary: Release delivery and activation health, security: [{adminBearer: []}], responses: {'200': {description: Release health,content: {application/json: {schema: {$ref: '#/components/schemas/OperationalReport'}}}},'401': {$ref: '#/components/responses/AuthenticationRequired'},'403': {$ref: '#/components/responses/Forbidden'},'500': {$ref: '#/components/responses/UnexpectedError'}}}
  /api/v1/admin/reports/learner-health:
    get: {operationId: getLearnerHealthReport, summary: Aggregate learner runtime health without learner PII, security: [{adminBearer: []}], responses: {'200': {description: Learner health,content: {application/json: {schema: {$ref: '#/components/schemas/OperationalReport'}}}},'401': {$ref: '#/components/responses/AuthenticationRequired'},'403': {$ref: '#/components/responses/Forbidden'},'503': {description: Learning Service reporting unavailable,content: {application/json: {schema: {$ref: '#/components/schemas/ApiError'}}}},'500': {$ref: '#/components/responses/UnexpectedError'}}}
components:
  securitySchemes:
    adminBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OIDC access token with audience content-api and an approved administrative realm role.
    developmentAdminIdentity:
      type: apiKey
      in: header
      name: X-Admin-Identity
      description: Non-production identity header.
    developmentAdminRoles:
      type: apiKey
      in: header
      name: X-Admin-Roles
      description: Non-production comma-separated roles. Recognized roles are CONTENT_AUTHOR, CONTENT_REVIEWER, CONTENT_PUBLISHER, and ADMIN.
  parameters:
    ExamId: {name: examId, in: path, required: true, schema: {type: string, format: uuid}}
    ExamVersionId: {name: examVersionId, in: path, required: true, schema: {type: string, format: uuid}}
    SubjectId: {name: subjectId, in: path, required: true, schema: {type: string, format: uuid}}
    TopicId: {name: topicId, in: path, required: true, schema: {type: string, format: uuid}}
    SourceId: {name: sourceId, in: path, required: true, schema: {type: string, format: uuid}}
    LearningObjectiveId: {name: learningObjectiveId, in: path, required: true, schema: {type: string, format: uuid}}
    KnowledgeFactId: {name: knowledgeFactId, in: path, required: true, schema: {type: string, format: uuid}}
    QuestionId: {name: questionId, in: path, required: true, schema: {type: string, format: uuid}}
    ReviewItemId: {name: reviewItemId,in: path,required: true,schema: {type: string,format: uuid}}
    ReleaseId: {name: releaseId,in: path,required: true,schema: {type: string,format: uuid}}
    Page: {name: page,in: query,schema: {type: integer,default: 0,minimum: 0}}
    Size: {name: size,in: query,schema: {type: integer,default: 20,minimum: 1,maximum: 100}}
    Search: {name: search,in: query,schema: {type: string}}
    DeleteReason: {name: reason,in: query,required: false,description: Optional audit reason for the irreversible deletion,schema: {type: string,maxLength: 1000}}
  requestBodies:
    VersionOnly: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/VersionOnly'}}}}
    Order: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/OrderRequest'}}}}
    FactAction: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/FactActionRequest'}}}}
  responses:
    AuthenticationRequired:
      description: Valid admin authentication is required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Forbidden:
      description: The authenticated identity lacks a required role
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    UnexpectedError:
      description: Unexpected server failure
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Validation: {description: Request validation failed,content: {application/json: {schema: {$ref: '#/components/schemas/ApiError'}}}}
    NotFound: {description: Resource not found,content: {application/json: {schema: {$ref: '#/components/schemas/ApiError'}}}}
    Conflict: {description: Conflict or stale version,content: {application/json: {schema: {$ref: '#/components/schemas/ApiError'}}}}
  schemas:
    OperationalReport:
      type: object
      additionalProperties: true
    AuditEvent:
      type: object
      required: [id,timestamp,actorId,actorName,actorRole,action,entityType,entityId,metadata,requestId]
      properties:
        id: {type: string,format: uuid}
        timestamp: {type: string,format: date-time}
        actorId: {type: string}
        actorName: {type: string}
        actorRole: {type: string}
        action: {type: string}
        entityType: {type: string}
        entityId: {type: string,format: uuid}
        entityVersion: {type: [integer,'null'],format: int64}
        previousState: {type: [object,'null'],additionalProperties: true}
        newState: {type: [object,'null'],additionalProperties: true}
        reason: {type: [string,'null']}
        metadata: {type: object,additionalProperties: true}
        ipAddress: {type: [string,'null']}
        requestId: {type: string}
    AuditEventPage:
      type: object
      required: [items,page,size,totalItems,totalPages]
      properties:
        items: {type: array,items: {$ref: '#/components/schemas/AuditEvent'}}
        page: {type: integer}
        size: {type: integer}
        totalItems: {type: integer,format: int64}
        totalPages: {type: integer,format: int64}
    StructureStatus: {type: string, enum: [DRAFT, ACTIVE, ARCHIVED]}
    SourceType: {type: string, enum: [GOVERNMENT_WEBPAGE,GOVERNMENT_DOCUMENT,LEGISLATION,PUBLIC_AUTHORITY_GUIDANCE,LICENSED_MATERIAL,INTERNAL_RESEARCH,OTHER]}
    ReviewStatus: {type: string, enum: [UNREVIEWED,REVIEWED,REQUIRES_UPDATE]}
    SourceStatus: {type: string, enum: [ACTIVE,RETIRED]}
    VersionOnly: {type: object,required: [version],properties: {version: {type: integer,format: int64,minimum: 0}}}
    OrderRequest: {type: object,required: [ids],properties: {ids: {type: array,items: {type: string,format: uuid}}}}
    AuditFields: {type: object,required: [id,createdAt,updatedAt,version],properties: {id: {type: string,format: uuid},createdAt: {type: string,format: date-time},updatedAt: {type: string,format: date-time},version: {type: integer,format: int64}}}
    Exam: {allOf: [{$ref: '#/components/schemas/AuditFields'},{type: object,required: [code,name,countryCode,status,versionCount],properties: {code: {type: string},name: {type: string},countryCode: {type: string},status: {$ref: '#/components/schemas/StructureStatus'},versionCount: {type: integer,format: int64}}}]}
    ExamRequest: {type: object,required: [code,name,countryCode,status],properties: {code: {type: string},name: {type: string},countryCode: {type: string},status: {$ref: '#/components/schemas/StructureStatus'},version: {type: integer,format: int64}}}
    ExamPage: {type: object,required: [items,page,size,totalItems,totalPages],properties: {items: {type: array,items: {$ref: '#/components/schemas/Exam'}},page: {type: integer},size: {type: integer},totalItems: {type: integer,format: int64},totalPages: {type: integer,format: int64}}}
    ExamVersion: {allOf: [{$ref: '#/components/schemas/AuditFields'},{type: object,required: [examId,versionCode,displayName,status],properties: {examId: {type: string,format: uuid},versionCode: {type: string},displayName: {type: string},status: {$ref: '#/components/schemas/StructureStatus'},validFrom: {type: [string,'null'],format: date},validTo: {type: [string,'null'],format: date}}}]}
    ExamVersionRequest: {type: object,required: [versionCode,displayName,status],properties: {versionCode: {type: string},displayName: {type: string},status: {$ref: '#/components/schemas/StructureStatus'},validFrom: {type: [string,'null'],format: date},validTo: {type: [string,'null'],format: date},version: {type: integer,format: int64}}}
    NodeRequest: {type: object,required: [code,name,sortOrder,status],properties: {code: {type: string},name: {type: string},description: {type: [string,'null']},sortOrder: {type: integer,minimum: 0},status: {$ref: '#/components/schemas/StructureStatus'},version: {type: integer,format: int64}}}
    Subject: {allOf: [{$ref: '#/components/schemas/AuditFields'},{$ref: '#/components/schemas/NodeRequest'},{type: object,required: [examVersionId],properties: {examVersionId: {type: string,format: uuid}}}]}
    Topic: {allOf: [{$ref: '#/components/schemas/AuditFields'},{$ref: '#/components/schemas/NodeRequest'},{type: object,required: [subjectId],properties: {subjectId: {type: string,format: uuid}}}]}
    SourceRequest: {type: object,required: [publisher,title,sourceType,accessedAt],properties: {publisher: {type: string},title: {type: string},url: {type: [string,'null'],format: uri},sourceType: {$ref: '#/components/schemas/SourceType'},documentVersion: {type: [string,'null']},publicationDate: {type: [string,'null'],format: date},accessedAt: {type: string,format: date},copyrightNotes: {type: [string,'null']},internalNotes: {type: [string,'null']},contentText: {type: [string,'null'],maxLength: 50000,description: Editorially supplied source material; never fetched automatically},replacementSourceId: {type: [string,'null'],format: uuid},version: {type: integer,format: int64}}}
    Source: {allOf: [{$ref: '#/components/schemas/AuditFields'},{$ref: '#/components/schemas/SourceRequest'},{type: object,required: [reviewStatus,status],properties: {contentChecksum: {type: [string,'null'],pattern: '^[a-f0-9]{64}$'},reviewStatus: {$ref: '#/components/schemas/ReviewStatus'},status: {$ref: '#/components/schemas/SourceStatus'}}}]}
    SourcePage: {type: object,required: [items,page,size,totalItems,totalPages],properties: {items: {type: array,items: {$ref: '#/components/schemas/Source'}},page: {type: integer},size: {type: integer},totalItems: {type: integer,format: int64},totalPages: {type: integer,format: int64}}}
    RetireSourceRequest: {type: object,required: [version],properties: {replacementSourceId: {type: [string,'null'],format: uuid},version: {type: integer,format: int64,minimum: 0}}}
    FactReviewStatus: {type: string,enum: [UNREVIEWED,UNDER_REVIEW,APPROVED,REJECTED,REQUIRES_UPDATE]}
    FactStatus: {type: string,enum: [DRAFT,ACTIVE,RETIRED]}
    LearningObjectiveRequest: {type: object,required: [topicId,code,title,status],properties: {topicId: {type: string,format: uuid},code: {type: string,minLength: 1},title: {type: string,minLength: 1},description: {type: [string,'null']},status: {$ref: '#/components/schemas/StructureStatus'},version: {type: integer,format: int64,minimum: 0}}}
    LearningObjective: {allOf: [{$ref: '#/components/schemas/AuditFields'},{$ref: '#/components/schemas/LearningObjectiveRequest'},{type: object,required: [topicName,subjectId,subjectName],properties: {topicName: {type: string},subjectId: {type: string,format: uuid},subjectName: {type: string}}}]}
    LearningObjectivePage: {type: object,required: [items,page,size,totalItems,totalPages],properties: {items: {type: array,items: {$ref: '#/components/schemas/LearningObjective'}},page: {type: integer},size: {type: integer},totalItems: {type: integer,format: int64},totalPages: {type: integer,format: int64}}}
    KnowledgeFactRequest: {type: object,required: [learningObjectiveId,canonicalStatement,sourceIds],properties: {learningObjectiveId: {type: string,format: uuid},canonicalStatement: {type: string,minLength: 1},validFrom: {type: [string,'null'],format: date},validTo: {type: [string,'null'],format: date},sourceIds: {type: array,minItems: 1,uniqueItems: true,items: {type: string,format: uuid}},version: {type: integer,format: int64,minimum: 0}}}
    KnowledgeFact: {allOf: [{$ref: '#/components/schemas/AuditFields'},{type: object,required: [learningObjectiveId,currentVersionId,canonicalStatement,reviewStatus,status,learningObjectiveTitle,topicId,topicName,subjectId,subjectName,sourceCount,sourceIds],properties: {learningObjectiveId: {type: string,format: uuid},currentVersionId: {type: string,format: uuid},canonicalStatement: {type: string},reviewStatus: {$ref: '#/components/schemas/FactReviewStatus'},status: {$ref: '#/components/schemas/FactStatus'},validFrom: {type: [string,'null'],format: date},validTo: {type: [string,'null'],format: date},learningObjectiveTitle: {type: string},topicId: {type: string,format: uuid},topicName: {type: string},subjectId: {type: string,format: uuid},subjectName: {type: string},sourceCount: {type: integer,format: int64},sourceIds: {type: array,items: {type: string,format: uuid}}}}]}
    KnowledgeFactPage: {type: object,required: [items,page,size,totalItems,totalPages],properties: {items: {type: array,items: {$ref: '#/components/schemas/KnowledgeFact'}},page: {type: integer},size: {type: integer},totalItems: {type: integer,format: int64},totalPages: {type: integer,format: int64}}}
    KnowledgeFactVersion: {type: object,required: [id,knowledgeFactId,versionNumber,canonicalStatement,reviewStatus,authorId,sourceIds,createdAt,updatedAt],properties: {id: {type: string,format: uuid},knowledgeFactId: {type: string,format: uuid},versionNumber: {type: integer},canonicalStatement: {type: string},reviewStatus: {$ref: '#/components/schemas/FactReviewStatus'},validFrom: {type: [string,'null'],format: date},validTo: {type: [string,'null'],format: date},authorId: {type: string},reviewerId: {type: [string,'null']},reviewNote: {type: [string,'null']},sourceIds: {type: array,items: {type: string,format: uuid}},createdAt: {type: string,format: date-time},updatedAt: {type: string,format: date-time}}}
    AiGenerationRequest: {type: object,additionalProperties: false,required: [sourceId,learningObjectiveId,requestedCount,language,idempotencyKey],properties: {sourceId: {type: string,format: uuid},learningObjectiveId: {type: string,format: uuid},requestedCount: {type: integer,minimum: 1,maximum: 20,default: 8},language: {type: string,minLength: 2,maxLength: 20},editorialInstruction: {type: [string,'null'],maxLength: 1000},idempotencyKey: {type: string,minLength: 1,maxLength: 200}}}
    AiJobStatus: {type: string,enum: [QUEUED,RUNNING,COMPLETED,PARTIALLY_COMPLETED,FAILED,CANCELLED]}
    AiGenerationJob: {type: object,required: [id,sourceId,sourceTitle,sourceContentChecksum,learningObjectiveId,learningObjectiveTitle,requestedBy,requestedCount,status,provider,model,promptVersion,createdAt,retryCount,generatedCount,version],properties: {id: {type: string,format: uuid},sourceId: {type: string,format: uuid},sourceTitle: {type: string},sourceContentChecksum: {type: string},learningObjectiveId: {type: string,format: uuid},learningObjectiveTitle: {type: string},requestedBy: {type: string},requestedCount: {type: integer},generatedCount: {type: integer,format: int64},status: {$ref: '#/components/schemas/AiJobStatus'},provider: {type: string},model: {type: string},promptVersion: {type: string},createdAt: {type: string,format: date-time},startedAt: {type: [string,'null'],format: date-time},completedAt: {type: [string,'null'],format: date-time},failedAt: {type: [string,'null'],format: date-time},cancelledAt: {type: [string,'null'],format: date-time},retryCount: {type: integer},inputTokens: {type: [integer,'null']},outputTokens: {type: [integer,'null']},totalTokens: {type: [integer,'null']},reportedCost: {type: [number,'null']},providerRequestId: {type: [string,'null']},errorCode: {type: [string,'null']},errorMessage: {type: [string,'null']},version: {type: integer,format: int64}}}
    AiSourceEvidence: {type: object,additionalProperties: false,required: [quote],properties: {quote: {type: string},location: {type: [string,'null']}}}
    AiProposalStatus: {type: string,enum: [PROPOSED,EDITED,ACCEPTED,REJECTED,DISCARDED]}
    AiKnowledgeFactProposal: {type: object,required: [id,generationJobId,sourceId,learningObjectiveId,proposedText,editedText,sourceEvidence,status,createdAt,updatedAt,version],properties: {id: {type: string,format: uuid},generationJobId: {type: string,format: uuid},sourceId: {type: string,format: uuid},learningObjectiveId: {type: string,format: uuid},proposedText: {type: string},editedText: {type: string},sourceEvidence: {type: array,items: {$ref: '#/components/schemas/AiSourceEvidence'}},confidence: {type: [string,'null'],enum: [HIGH,MEDIUM,LOW,null]},modelNote: {type: [string,'null']},status: {$ref: '#/components/schemas/AiProposalStatus'},rejectionReason: {type: [string,'null']},resultingKnowledgeFactId: {type: [string,'null'],format: uuid},acceptedBy: {type: [string,'null']},acceptedAt: {type: [string,'null'],format: date-time},createdAt: {type: string,format: date-time},updatedAt: {type: string,format: date-time},version: {type: integer,format: int64}}}
    AiProposalEditRequest: {type: object,additionalProperties: false,required: [text,version],properties: {text: {type: string,minLength: 1,maxLength: 500},version: {type: integer,format: int64,minimum: 0}}}
