    post: {operationId: createKnowledgeFact, summary: Create knowledge fact, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/KnowledgeFactRequest'}}}}, responses: {'201': {description: Created,content: {application/json: {schema: {$ref: '#/components/schemas/KnowledgeFact'}}}},'409': {$ref: '#/components/responses/Conflict'},'422': {$ref: '#/components/responses/Validation'}}}
  /api/v1/admin/knowledge-facts/{knowledgeFactId}:
    parameters: [{$ref: '#/components/parameters/KnowledgeFactId'}]
    get: {operationId: getKnowledgeFact, summary: Get knowledge fact, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], responses: {'200': {description: Knowledge fact,content: {application/json: {schema: {$ref: '#/components/schemas/KnowledgeFact'}}}},'404': {$ref: '#/components/responses/NotFound'}}}
    put: {operationId: updateKnowledgeFact, summary: Update knowledge fact or create a draft version from an approved fact, security: [{developmentAdminIdentity: [],developmentAdminRoles: []}], requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/KnowledgeFactRequest'}}}}, responses: {'200': {description: Updated fact,content: {application/json: {schema: {$ref: '#/components/schemas/KnowledgeFact'}}}},'409': {$ref: '#/components/responses/Conflict'},'422': {$ref: '#/components/responses/Validation'}}}
