  /api/v1/admin/questions:
    get: {operationId: listQuestions, summary: Search and filter questions, security: [{adminBearer: []}], parameters: [{$ref: '#/components/parameters/Page'},{$ref: '#/components/parameters/Size'},{$ref: '#/components/parameters/Search'},{name: learningObjectiveId,in: query,schema: {type: string,format: uuid}},{name: questionType,in: query,schema: {$ref: '#/components/schemas/QuestionType'}},{name: difficulty,in: query,schema: {$ref: '#/components/schemas/QuestionDifficulty'}},{name: reviewStatus,in: query,schema: {$ref: '#/components/schemas/FactReviewStatus'}},{name: status,in: query,schema: {$ref: '#/components/schemas/FactStatus'}}], responses: {'200': {description: Question page,content: {application/json: {schema: {$ref: '#/components/schemas/QuestionPage'}}}}}}
    post: {operationId: createQuestion, summary: Create a draft question, security: [{adminBearer: []}], requestBody: {required: true,content: {application/json: {schema: {$ref: '#/components/schemas/QuestionRequest'}}}}, responses: {'201': {description: Created,content: {application/json: {schema: {$ref: '#/components/schemas/Question'}}}},'409': {$ref: '#/components/responses/Conflict'},'422': {$ref: '#/components/responses/Validation'}}}
  /api/v1/admin/questions/search:
