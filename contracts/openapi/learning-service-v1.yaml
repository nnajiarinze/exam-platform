openapi: 3.1.0
info:
  title: Learning Service API
  version: 1.0.0
  description: Learner runtime API. The internal import operation requires service authentication.
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: /
paths:
  /api/v1/content/subjects:
    get:
      summary: List active subjects and topics
      operationId: getSubjects
      tags: [Content projection]
      security: [{ learnerIdentity: [] }]
      parameters:
        - name: examId
          in: query
          required: true
          schema: { type: string, minLength: 1, maxLength: 200 }
      responses:
        "200":
          description: Subjects and topics from the active learner-facing content release.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Subject" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /internal/v1/content-releases/import:
    description: The version segment is required; there is no `/internal/content-releases/import` alias.
    post:
      summary: Import a published content release
      operationId: importContentRelease
      tags: [Internal content projection]
      security: [{ internalApiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ./content-snapshot-v1.schema.json
      responses:
        "200":
          description: Imported or previously imported with the same checksum.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentImportResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "422": { $ref: "#/components/responses/Unprocessable" }
  /api/v1/practice-sessions:
    post:
      summary: Create a practice session
      operationId: createPracticeSession
      tags: [Practice]
      security: [{ learnerIdentity: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePracticeSessionRequest" }
      responses:
        "200":
          description: Stable practice session created.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PracticeSession" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
  /api/v1/practice-sessions/{sessionId}:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      summary: Get a practice session
      operationId: getPracticeSession
      tags: [Practice]
      security: [{ learnerIdentity: [] }]
      responses:
        "200":
          description: Session owned by the current learner.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PracticeSession" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/practice-sessions/{sessionId}/next:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    get:
      summary: Get the next unanswered question
      operationId: getNextPracticeQuestion
      tags: [Practice]
      security: [{ learnerIdentity: [] }]
      responses:
        "200":
          description: Next unanswered question. Correctness and explanation are intentionally absent.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PracticeQuestion" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/practice-sessions/{sessionId}/responses:
    parameters:
      - $ref: "#/components/parameters/SessionId"
    post:
      summary: Submit one answer
      operationId: submitPracticeResponse
      tags: [Practice]
      security: [{ learnerIdentity: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitAnswerRequest" }
      responses:
        "200":
          description: Accepted answer evaluation based on imported published content.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AnswerResult" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/progress/topics:
    get:
      summary: List topic progress
      operationId: getTopicProgress
      tags: [Progress]
      security: [{ learnerIdentity: [] }]
      responses:
        "200":
          description: Basic topic aggregates; not a readiness score.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TopicProgress" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/mock-exams:
    post:
      summary: Start a mock examination from the active configured blueprint
      operationId: createMockExam
      tags: [Mock examinations]
      security: [{ learnerIdentity: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMockExamRequest" }
      responses:
        "200":
          description: Fixed mock examination attempt created.
          content: { application/json: { schema: { $ref: "#/components/schemas/MockExamAttempt" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/Unprocessable" }
  /api/v1/mock-exams/history:
    get:
      summary: List finalized mock examination attempts
      operationId: getMockExamHistory
      tags: [Mock examinations]
      security: [{ learnerIdentity: [] }]
      responses:
        "200":
          description: Finalized attempts in reverse chronological order.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/MockExamHistoryItem" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /api/v1/mock-exams/{attemptId}:
    parameters:
      - $ref: "#/components/parameters/AttemptId"
    get:
      summary: Get mock examination metadata and navigation state
      operationId: getMockExam
      tags: [Mock examinations]
      security: [{ learnerIdentity: [] }]
      responses:
        "200":
          description: Learner-owned mock examination attempt.
          content: { application/json: { schema: { $ref: "#/components/schemas/MockExamAttempt" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
  /api/v1/mock-exams/{attemptId}/next:
    parameters:
      - $ref: "#/components/parameters/AttemptId"
      - name: sequenceNumber
        in: query
        required: false
        description: Optional sequence to support previous, next, and jump navigation. Omit for next unanswered.
        schema: { type: integer, minimum: 1 }
    get:
      summary: Get a mock examination question
      operationId: getMockExamQuestion
      tags: [Mock examinations]
      security: [{ learnerIdentity: [] }]
      responses:
        "200":
          description: Question without correctness or explanation.
          content: { application/json: { schema: { $ref: "#/components/schemas/MockExamQuestion" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/mock-exams/{attemptId}/responses:
    parameters:
      - $ref: "#/components/parameters/AttemptId"
    post:
      summary: Store or replace an answer before final submission
      operationId: submitMockExamResponse
      tags: [Mock examinations]
      security: [{ learnerIdentity: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SubmitMockExamAnswerRequest" }
      responses:
        "200":
          description: Updated attempt progress; correctness remains hidden.
          content: { application/json: { schema: { $ref: "#/components/schemas/MockExamProgress" } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/mock-exams/{attemptId}/questions/{attemptQuestionId}/flag:
    parameters:
      - $ref: "#/components/parameters/AttemptId"
      - name: attemptQuestionId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      summary: Set or clear a review flag
      operationId: flagMockExamQuestion
      tags: [Mock examinations]
      security: [{ learnerIdentity: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/FlagMockExamQuestionRequest" }
      responses:
        "200":
          description: Updated attempt progress.
          content: { application/json: { schema: { $ref: "#/components/schemas/MockExamProgress" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/mock-exams/{attemptId}/submit:
    parameters:
      - $ref: "#/components/parameters/AttemptId"
    post:
      summary: Finalize and score a mock examination
      operationId: submitMockExam
      tags: [Mock examinations]
      security: [{ learnerIdentity: [] }]
      responses:
        "200":
          description: Permanently stored score and detailed results.
          content: { application/json: { schema: { $ref: "#/components/schemas/MockExamResult" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /api/v1/mock-exams/{attemptId}/results:
    parameters:
      - $ref: "#/components/parameters/AttemptId"
    get:
      summary: Get detailed results for a finalized mock examination
      operationId: getMockExamResults
      tags: [Mock examinations]
      security: [{ learnerIdentity: [] }]
      responses:
        "200":
          description: Stored score, topic breakdown, and incorrect-question review.
          content: { application/json: { schema: { $ref: "#/components/schemas/MockExamResult" } } }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
components:
  securitySchemes:
    internalApiKey:
      type: apiKey
      in: header
      name: X-Internal-Api-Key
      description: Temporary service credential pending the production workload-identity adapter.
    learnerIdentity:
      type: apiKey
      in: header
      name: X-Learner-Identity
      description: Development/test identity only; disabled by default and not production authentication.
  parameters:
    SessionId:
      name: sessionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    AttemptId:
      name: attemptId
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    BadRequest:
      description: Invalid request.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unauthorized:
      description: Authentication is absent or invalid.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Learner-owned or requested resource was not found.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Conflict:
      description: Request conflicts with current or previously accepted state.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unprocessable:
      description: Structurally valid request violates content or selection rules.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  schemas:
    Subject:
      type: object
      additionalProperties: false
      required: [id, name, topics]
      properties:
        id: { type: string, maxLength: 200 }
        name: { type: string, maxLength: 500 }
        topics:
          type: array
          items: { $ref: "#/components/schemas/Topic" }
    Topic:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id: { type: string, maxLength: 200 }
        name: { type: string, maxLength: 500 }
        description: { type: [string, "null"] }
    PracticeMode:
      type: string
      enum: [TOPIC, MIXED, INCORRECT_REVIEW]
      description: INCORRECT_REVIEW is reserved but not executable in v1.
    PracticeStatus:
      type: string
      enum: [ACTIVE, COMPLETED, ABANDONED]
    CreatePracticeSessionRequest:
      type: object
      additionalProperties: false
      required: [examId, mode, questionCount]
      properties:
        examId: { type: string, minLength: 1, maxLength: 200 }
        topicId: { type: [string, "null"], maxLength: 200 }
        mode: { $ref: "#/components/schemas/PracticeMode" }
        questionCount: { type: integer, minimum: 1, maximum: 50 }
    PracticeSession:
      type: object
      required: [sessionId, mode, status, answered, total]
      properties:
        sessionId: { type: string, format: uuid }
        mode: { $ref: "#/components/schemas/PracticeMode" }
        topicId: { type: [string, "null"] }
        status: { $ref: "#/components/schemas/PracticeStatus" }
        answered: { type: integer, minimum: 0 }
        total: { type: integer, minimum: 1 }
        nextQuestion:
          oneOf:
            - $ref: "#/components/schemas/PracticeQuestion"
            - type: "null"
    PracticeQuestion:
      type: object
      additionalProperties: false
      required: [sessionQuestionId, questionId, prompt, questionType, answerOptions, sequenceNumber, totalQuestionCount]
      properties:
        sessionQuestionId: { type: string, format: uuid }
        questionId: { type: string }
        prompt: { type: string }
        questionType: { type: string, enum: [SINGLE_CHOICE] }
        answerOptions:
          type: array
          minItems: 2
          items: { $ref: "#/components/schemas/AnswerOption" }
        sequenceNumber: { type: integer, minimum: 1 }
        totalQuestionCount: { type: integer, minimum: 1 }
    AnswerOption:
      type: object
      additionalProperties: false
      required: [id, text]
      properties:
        id: { type: string }
        text: { type: string }
    SubmitAnswerRequest:
      type: object
      additionalProperties: false
      required: [sessionQuestionId, selectedAnswerOptionId]
      properties:
        sessionQuestionId: { type: string, format: uuid }
        selectedAnswerOptionId: { type: string, minLength: 1, maxLength: 200 }
        responseTimeMillis: { type: [integer, "null"], format: int64, minimum: 0 }
    AnswerResult:
      type: object
      required: [correct, selectedAnswerOptionId, correctAnswerOptionId, explanation, sessionProgress]
      properties:
        correct: { type: boolean }
        selectedAnswerOptionId: { type: string }
        correctAnswerOptionId: { type: string }
        explanation: { type: string }
        sessionProgress:
          type: object
          required: [answered, total]
          properties:
            answered: { type: integer, minimum: 0 }
            total: { type: integer, minimum: 1 }
    TopicProgress:
      type: object
      required: [topicId, questionsAnswered, correctAnswers, accuracyPercentage, lastPractisedAt]
      properties:
        topicId: { type: string }
        questionsAnswered: { type: integer, minimum: 0 }
        correctAnswers: { type: integer, minimum: 0 }
        accuracyPercentage: { type: number, minimum: 0, maximum: 100 }
        lastPractisedAt: { type: string, format: date-time }
    ContentImportResponse:
      type: object
      required: [releaseId, imported, status]
      properties:
        releaseId: { type: string, format: uuid }
        imported: { type: boolean }
        status: { type: string, enum: [ACTIVE, SUPERSEDED] }
    CreateMockExamRequest:
      type: object
      additionalProperties: false
      required: [examId]
      properties:
        examId: { type: string, minLength: 1, maxLength: 200 }
    MockExamStatus:
      type: string
      enum: [ACTIVE, SUBMITTED, EXPIRED, ABANDONED]
    MockExamNavigationItem:
      type: object
      additionalProperties: false
      required: [attemptQuestionId, sequenceNumber, answered, flagged]
      properties:
        attemptQuestionId: { type: string, format: uuid }
        sequenceNumber: { type: integer, minimum: 1 }
        answered: { type: boolean }
        flagged: { type: boolean }
    MockExamAttempt:
      type: object
      additionalProperties: false
      required: [attemptId, name, status, startedAt, totalQuestions, durationMinutes, remainingSeconds, answered, questions]
      properties:
        attemptId: { type: string, format: uuid }
        name: { type: string }
        status: { $ref: "#/components/schemas/MockExamStatus" }
        startedAt: { type: string, format: date-time }
        submittedAt: { type: [string, "null"], format: date-time }
        totalQuestions: { type: integer, minimum: 1 }
        durationMinutes: { type: integer, minimum: 1 }
        remainingSeconds: { type: integer, minimum: 0 }
        answered: { type: integer, minimum: 0 }
        questions:
          type: array
          items: { $ref: "#/components/schemas/MockExamNavigationItem" }
    MockExamQuestion:
      type: object
      additionalProperties: false
      required: [attemptQuestionId, questionId, prompt, questionType, answerOptions, sequenceNumber, totalQuestions, flagged, remainingSeconds]
      properties:
        attemptQuestionId: { type: string, format: uuid }
        questionId: { type: string }
        prompt: { type: string }
        questionType: { type: string, enum: [SINGLE_CHOICE] }
        answerOptions:
          type: array
          minItems: 2
          items: { $ref: "#/components/schemas/AnswerOption" }
        sequenceNumber: { type: integer, minimum: 1 }
        totalQuestions: { type: integer, minimum: 1 }
        selectedAnswerOptionId: { type: [string, "null"] }
        flagged: { type: boolean }
        remainingSeconds: { type: integer, minimum: 0 }
    SubmitMockExamAnswerRequest:
      type: object
      additionalProperties: false
      required: [attemptQuestionId, selectedAnswerOptionId]
      properties:
        attemptQuestionId: { type: string, format: uuid }
        selectedAnswerOptionId: { type: string, minLength: 1, maxLength: 200 }
    FlagMockExamQuestionRequest:
      type: object
      additionalProperties: false
      required: [flagged]
      properties:
        flagged: { type: boolean }
    MockExamProgress:
      type: object
      additionalProperties: false
      required: [answered, total, flagged, remainingSeconds]
      properties:
        answered: { type: integer, minimum: 0 }
        total: { type: integer, minimum: 1 }
        flagged: { type: integer, minimum: 0 }
        remainingSeconds: { type: integer, minimum: 0 }
    MockExamTopicResult:
      type: object
      additionalProperties: false
      required: [topicId, topicName, total, answered, correct, percentage]
      properties:
        topicId: { type: string }
        topicName: { type: string }
        total: { type: integer, minimum: 1 }
        answered: { type: integer, minimum: 0 }
        correct: { type: integer, minimum: 0 }
        percentage: { type: number, minimum: 0, maximum: 100 }
    MockExamIncorrectQuestion:
      type: object
      additionalProperties: false
      required: [questionId, prompt, correctAnswerOptionId, correctAnswerText, explanation]
      properties:
        questionId: { type: string }
        prompt: { type: string }
        selectedAnswerOptionId: { type: [string, "null"] }
        selectedAnswerText: { type: [string, "null"] }
        correctAnswerOptionId: { type: string }
        correctAnswerText: { type: string }
        explanation: { type: string }
    MockExamResult:
      type: object
      additionalProperties: false
      required: [attemptId, name, status, startedAt, completedAt, durationSeconds, correctAnswers, incorrectAnswers, percentage, passed, topics, incorrectQuestions]
      properties:
        attemptId: { type: string, format: uuid }
        name: { type: string }
        status: { $ref: "#/components/schemas/MockExamStatus" }
        startedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        durationSeconds: { type: integer, minimum: 0 }
        correctAnswers: { type: integer, minimum: 0 }
        incorrectAnswers: { type: integer, minimum: 0 }
        percentage: { type: number, minimum: 0, maximum: 100 }
        passed: { type: boolean }
        topics:
          type: array
          items: { $ref: "#/components/schemas/MockExamTopicResult" }
        incorrectQuestions:
          type: array
          items: { $ref: "#/components/schemas/MockExamIncorrectQuestion" }
    MockExamHistoryItem:
      type: object
      additionalProperties: false
      required: [attemptId, name, status, startedAt, durationSeconds, score, percentage, passed, totalQuestions]
      properties:
        attemptId: { type: string, format: uuid }
        name: { type: string }
        status: { $ref: "#/components/schemas/MockExamStatus" }
        startedAt: { type: string, format: date-time }
        durationSeconds: { type: integer, minimum: 0 }
        score: { type: integer, minimum: 0 }
        percentage: { type: number, minimum: 0, maximum: 100 }
        passed: { type: boolean }
        totalQuestions: { type: integer, minimum: 1 }
    Error:
      type: object
      required: [code, message, timestamp, errors]
      properties:
        code: { type: string }
        message: { type: string }
        timestamp: { type: string, format: date-time }
        errors:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field: { type: string }
              message: { type: string }
